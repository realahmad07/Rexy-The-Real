<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rexy AI Auditor</title>
    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      // This happens when polyfills try to overwrite the native fetch in some environments.
      (function() {
        try {
          var _fetch = window.fetch;
          if (_fetch) {
            Object.defineProperty(window, 'fetch', {
              configurable: true,
              enumerable: true,
              get: function() { return _fetch; },
              set: function(v) { 
                console.warn('Attempted to overwrite window.fetch. Ignoring to prevent TypeError.');
              }
            });
          }
        } catch (e) {
          // If we can't redefine it, it might already be protected
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
